name: Scraper Semanal de Supermercados

on:
  schedule:
    # Lunes a las 7:00 AM hora España (UTC+1 invierno / UTC+2 verano)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Permite elegir qué scrapers ejecutar manualmente
    inputs:
      scrapers:
        description: 'Scrapers a ejecutar (separados por coma, o "todos")'
        required: false
        default: 'todos'
        type: string

# ─────────────────────────────────────────────────────────────
# Cada scraper corre en PARALELO como job independiente.
# Así Eroski (62 min) no bloquea a Mercadona (21 seg).
# Si uno falla, los demás siguen y se guardan sus datos.
# Los resultados se importan directamente a PostgreSQL (Aiven).
# ─────────────────────────────────────────────────────────────

jobs:

  # ── MERCADONA (API rápida, ~30 seg) ──────────────────────────
  mercadona:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'mercadona') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar Mercadona
        run: python run_scraper.py mercadona --export-csv export/mercadona.csv --skip-db
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mercadona
          path: export/mercadona.csv
          retention-days: 3

  # ── CARREFOUR (API directa, sin Playwright) ──────────────────
  carrefour:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'carrefour') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Configurar .env
        run: |
          echo "CODIGO_POSTAL=${{ secrets.CODIGO_POSTAL }}" >> .env
      - name: Ejecutar Carrefour
        run: python run_scraper.py carrefour --export-csv export/carrefour.csv --skip-db
        timeout-minutes: 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: carrefour
          path: export/carrefour.csv
          retention-days: 3

  # ── DIA (API + cookie con Playwright) ────────────────────────
  dia:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'dia') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Instalar Playwright (para cookies)
        run: |
          playwright install chromium
          playwright install-deps chromium
      - name: Configurar .env
        run: |
          echo "CODIGO_POSTAL=${{ secrets.CODIGO_POSTAL }}" >> .env
          echo "COOKIE_DIA=${{ secrets.COOKIE_DIA }}" >> .env
      - name: Ejecutar Dia
        run: python run_scraper.py dia --export-csv export/dia.csv --skip-db
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dia
          path: export/dia.csv
          retention-days: 3

  # ── ALCAMPO (Playwright completo, ~17 min) ───────────────────
  alcampo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'alcampo') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Instalar Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      - name: Configurar .env
        run: |
          echo "CODIGO_POSTAL=${{ secrets.CODIGO_POSTAL }}" >> .env
      - name: Ejecutar Alcampo
        run: python run_scraper.py alcampo --export-csv export/alcampo.csv --skip-db
        timeout-minutes: 25
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alcampo
          path: export/alcampo.csv
          retention-days: 3

  # ── EROSKI (Playwright, ~62 min — el más lento) ──────────────
  eroski:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'eroski') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Instalar Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      - name: Configurar .env
        run: |
          echo "CODIGO_POSTAL=${{ secrets.CODIGO_POSTAL }}" >> .env
      - name: Ejecutar Eroski
        run: python run_scraper.py eroski --export-csv export/eroski.csv --skip-db
        timeout-minutes: 110
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eroski
          path: export/eroski.csv
          retention-days: 3

  # ── CONSUM (API directa, sin Playwright) ─────────────────────
  consum:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'consum') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar Consum
        run: python run_scraper.py consum --export-csv export/consum.csv --skip-db
        timeout-minutes: 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: consum
          path: export/consum.csv
          retention-days: 3

  # ── CONDIS (API Empathy, sin Playwright) ─────────────────────
  condis:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      contains(github.event.inputs.scrapers, 'condis') ||
      github.event.inputs.scrapers == 'todos' ||
      github.event.inputs.scrapers == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar Condis
        run: python run_scraper.py condis --export-csv export/condis.csv --skip-db
        timeout-minutes: 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: condis
          path: export/condis.csv
          retention-days: 3

  # ── MERGE: importar todos los CSVs a PostgreSQL (Aiven) ──────
  guardar-en-db:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [mercadona, dia, carrefour, alcampo, eroski, consum, condis]
    if: always()

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar conexion a base de datos
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env

      - name: Descargar resultados de Mercadona
        uses: actions/download-artifact@v4
        with:
          name: mercadona
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Dia
        uses: actions/download-artifact@v4
        with:
          name: dia
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Carrefour
        uses: actions/download-artifact@v4
        with:
          name: carrefour
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Alcampo
        uses: actions/download-artifact@v4
        with:
          name: alcampo
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Eroski
        uses: actions/download-artifact@v4
        with:
          name: eroski
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Consum
        uses: actions/download-artifact@v4
        with:
          name: consum
          path: export/
        continue-on-error: true

      - name: Descargar resultados de Condis
        uses: actions/download-artifact@v4
        with:
          name: condis
          path: export/
        continue-on-error: true

      - name: Importar resultados a PostgreSQL
        run: |
          ls -la export/ || echo "No hay archivos CSV"
          python import_results.py export/*.csv || echo "No se pudieron importar resultados"
